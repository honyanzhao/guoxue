<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>古诗词学习 - 完整版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Segoe UI",sans-serif;background:#F5F0E8;color:#333;min-height:100vh}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:#F5F0E8}

/* 顶部导航 */
.nav-header{background:linear-gradient(135deg,#8B4513,#A0522D);color:#fff;padding:16px;text-align:center;position:sticky;top:0;z-index:10}
.nav-header h1{font-size:18px;font-weight:600}
.nav-header .back-btn{position:absolute;left:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:4px}

/* 页面容器 */
.page{display:none;flex-direction:column;flex:1}
.page.active{display:flex}

/* 首页 */
.home-header{background:linear-gradient(135deg,#8B4513,#A0522D);color:#fff;text-align:center;padding:32px 16px 24px;border-radius:0 0 20px 20px}
.home-header h1{font-size:26px;margin:0;letter-spacing:2px}
.home-header p{font-size:14px;opacity:0.85;margin-top:8px}
.progress-ring{width:80px;height:80px;margin:16px auto 0;border-radius:50%;background:conic-gradient(#27ae60 0deg,#e0e0e0 0deg);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;color:#8B4513;background-color:#fff;position:relative}
.progress-ring::before{content:'';position:absolute;width:64px;height:64px;background:#F5F0E8;border-radius:50%}

.module-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px}
.module-card{background:#fff;border-radius:12px;padding:20px 12px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.08);cursor:pointer;transition:transform 0.15s;border-top:4px solid}
.module-card:active{transform:scale(0.96)}
.module-icon{font-size:36px;margin-bottom:8px}
.module-name{font-size:15px;font-weight:600;color:#333}
.module-desc{font-size:11px;color:#999;margin-top:4px}
.module-count{font-size:12px;color:#8B4513;margin-top:6px;font-weight:500}

/* 列表页 */
.list-header{padding:12px 16px;display:flex;align-items:center;gap:12px}
.list-header h2{font-size:17px;flex:1}
.filter-tabs{display:flex;gap:8px;padding:0 16px 12px;overflow-x:auto}
.filter-tab{padding:6px 14px;border-radius:20px;font-size:13px;border:1px solid #ddd;background:#fff;white-space:nowrap;cursor:pointer}
.filter-tab.active{background:#8B4513;color:#fff;border-color:#8B4513}

/* 搜索框 */
.search-container{padding:8px 16px 4px}
.search-box{display:flex;align-items:center;background:#fff;border:2px solid #8B4513;border-radius:24px;padding:8px 16px;gap:8px}
.search-icon{color:#8B4513;font-size:18px;flex:none}
.search-input{flex:1;border:none;outline:none;font-size:15px;background:transparent;color:#333}
.search-input::placeholder{color:#999}
.search-clear{color:#999;font-size:18px;cursor:pointer;flex:none;display:none}
.search-clear.show{display:block}
.search-type-tabs{display:flex;gap:6px;padding:8px 16px 12px;justify-content:center}
.search-type-tab{padding:4px 12px;border-radius:16px;font-size:12px;border:1px solid #8B4513;background:#fff;color:#8B4513;cursor:pointer;transition:all 0.2s}
.search-type-tab.active{background:#8B4513;color:#fff}
.search-result-count{text-align:center;font-size:12px;color:#999;padding:4px 0}
.list-scroll{flex:1;overflow-y:auto;padding:0 16px 16px}
.list-item{background:#fff;border-radius:10px;padding:14px;margin-bottom:8px;display:flex;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,0.06);cursor:pointer}
.list-item:active{background:#f9f9f9}
.list-item-icon{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-right:12px;flex:none}
.list-item-info{flex:1;min-width:0}
.list-item-title{font-size:15px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.list-item-sub{font-size:12px;color:#999;margin-top:2px}
.list-item-badge{font-size:11px;padding:2px 8px;border-radius:10px;flex:none}
.badge-done{background:#d4edda;color:#155724}
.badge-new{background:#fff3cd;color:#856404}

/* 闯关页 */
.challenge-header{padding:12px 16px;display:flex;align-items:center;gap:12px}
.challenge-progress{flex:1;height:6px;background:#e0e0e0;border-radius:3px;overflow:hidden}
.challenge-progress-fill{height:100%;background:linear-gradient(90deg,#8B4513,#D2691E);border-radius:3px;transition:width 0.4s}
.challenge-counter{font-size:13px;color:#666;white-space:nowrap}
.question-card{margin:0 16px;background:#fff;border-radius:16px;padding:24px;box-shadow:0 4px 16px rgba(0,0,0,0.1);min-height:280px;display:flex;flex-direction:column;justify-content:center}
.question-type-tag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;margin-bottom:12px}
.tag-choice{background:#e3f2fd;color:#1565c0}
.tag-fill{background:#fff3e0;color:#e65100}
.tag-tf{background:#e8f5e9;color:#2e7d32}
.tag-order{background:#f3e5f5;color:#7b1fa2}
.question-text{font-size:17px;line-height:1.8;margin-bottom:20px;color:#333}
.question-hint{font-size:13px;color:#999;margin-bottom:16px;font-style:italic}
.option-list{display:flex;flex-direction:column;gap:8px}
.option-btn{display:flex;align-items:center;padding:12px 16px;border:1.5px solid #e0e0e0;border-radius:10px;background:#fff;font-size:15px;cursor:pointer;transition:all 0.15s;min-height:48px}
.option-btn:active{transform:scale(0.98)}
.option-btn.selected{border-color:#8B4513;background:#fdf6ee}
.option-btn.correct{border-color:#27ae60;background:#e8f5e9;color:#1b5e20}
.option-btn.wrong{border-color:#e74c3c;background:#fde8e8;color:#b71c1c}
.option-letter{width:28px;height:28px;border-radius:50%;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;margin-right:12px;flex:none;color:#666}
.option-btn.selected .option-letter{background:#8B4513;color:#fff}
.fill-input{width:100%;padding:14px 16px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:16px;outline:none;transition:border-color 0.2s}
.fill-input:focus{border-color:#8B4513}
.tf-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tf-btn{padding:16px;border:1.5px solid #e0e0e0;border-radius:12px;font-size:16px;cursor:pointer;background:#fff;transition:all 0.15s}
.tf-btn:active{transform:scale(0.97)}
.tf-btn.selected-correct{border-color:#27ae60;background:#e8f5e9;color:#1b5e20}
.tf-btn.selected-wrong{border-color:#e74c3c;background:#fde8e8;color:#b71c1c}
.order-area{display:flex;flex-direction:column;gap:6px}
.order-item{padding:12px 16px;border:1.5px solid #e0e0e0;border-radius:10px;background:#fff;cursor:move;display:flex;align-items:center;gap:12px;user-select:none}
.order-item.dragging{opacity:0.5;border-style:dashed}
.order-num{width:24px;height:24px;border-radius:50%;background:#8B4513;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;flex:none}
.submit-section{padding:16px;margin-top:auto}
.submit-btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;background:linear-gradient(135deg,#8B4513,#A0522D);color:#fff;transition:opacity 0.2s}
.submit-btn:disabled{opacity:0.4;cursor:not-allowed}
.submit-btn:active:not(:disabled){transform:scale(0.98)}

/* 结果页 */
.result-page{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center}
.result-emoji{font-size:64px;margin-bottom:16px}
.result-title{font-size:24px;font-weight:700;color:#333;margin-bottom:8px}
.result-stars{font-size:36px;margin:12px 0;letter-spacing:4px}
.result-score{font-size:16px;color:#8B4513;margin-bottom:4px}
.result-points{font-size:14px;color:#666;margin-bottom:24px}
.result-badge{background:linear-gradient(135deg,#fff8e1,#fffde7);border:1px solid #ffd54f;border-radius:12px;padding:16px;margin-bottom:24px;width:100%;max-width:320px}
.result-badge .badge-icon{font-size:32px;margin-bottom:8px}
.result-badge .badge-name{font-size:15px;font-weight:600;color:#e65100}
.result-badge .badge-desc{font-size:12px;color:#999;margin-top:4px}
.result-actions{display:flex;gap:12px;width:100%;max-width:320px}
.result-actions .btn{flex:1;padding:12px;border-radius:10px;font-size:14px;cursor:pointer;border:none}
.btn-outline{background:#fff;border:1.5px solid #8B4513!important;color:#8B4513}
.btn-solid{background:linear-gradient(135deg,#8B4513,#A0522D);color:#fff}

/* 个人中心 */
.profile-header{background:linear-gradient(135deg,#8B4513,#A0522D);padding:32px 16px 24px;text-align:center;color:#fff;border-radius:0 0 20px 20px}
.profile-avatar{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 12px;cursor:pointer}
.profile-level{font-size:20px;font-weight:700}
.profile-points{font-size:14px;opacity:0.85;margin-top:4px}
.profile-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#e0e0e0;margin:16px;border-radius:12px;overflow:hidden}
.stat-cell{background:#fff;padding:16px;text-align:center}
.stat-num{font-size:22px;font-weight:700;color:#8B4513}
.stat-label{font-size:11px;color:#999;margin-top:4px}
.profile-badges{padding:16px}
.profile-badges h3{font-size:16px;margin-bottom:12px}
.badge-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.badge-item{text-align:center;padding:8px}
.badge-item .b-icon{font-size:28px;margin-bottom:4px;filter:grayscale(100%) opacity(0.3)}
.badge-item.unlocked .b-icon{filter:none}
.badge-item .b-name{font-size:10px;color:#999}
.badge-item.unlocked .b-name{color:#333;font-weight:500}
.profile-actions{padding:0 16px 24px;display:flex;flex-direction:column;gap:8px}
.profile-actions .btn{padding:12px;border-radius:10px;font-size:14px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#666}

/* 底部导航 */
.tab-bar{display:flex;border-top:1px solid #e0e0e0;background:#fff;padding-bottom:env(safe-area-inset-bottom);position:sticky;bottom:0;z-index:10}
.tab-item{flex:1;padding:8px 0;text-align:center;cursor:pointer;color:#999;font-size:12px;border:none;background:none}
.tab-item.active{color:#8B4513}
.tab-item .tab-icon{font-size:20px;display:block;margin-bottom:2px}

/* 诗词详情页 */
.detail-header{padding:12px 16px;display:flex;align-items:center;gap:12px}
.detail-header h2{font-size:17px;flex:1}
.detail-body{padding:16px;flex:1;overflow-y:auto}
.detail-poem{background:#fff;border-radius:16px;padding:24px 20px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
.detail-poem-title{font-size:22px;font-weight:700;color:#8B4513;text-align:center;margin-bottom:4px}
.detail-poem-author{font-size:14px;color:#999;text-align:center;margin-bottom:20px}
.detail-poem-lines{font-size:18px;line-height:2.2;color:#333;text-align:center;letter-spacing:1px}
.detail-poem-lines .line-with-pinyin{margin-bottom:8px}
.detail-poem-lines .pinyin-line{font-size:13px;color:#8B4513;margin-bottom:2px;letter-spacing:2px}
.detail-poem-lines .content-line{font-size:18px;color:#333}
.detail-section{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,0.06)}
.detail-section h3{font-size:15px;color:#8B4513;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.detail-section p{font-size:14px;line-height:1.9;color:#444}
.detail-actions{display:flex;gap:12px;padding:16px}
.detail-actions .btn{flex:1;padding:14px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s}
.btn-tts{background:#f0f7ff;color:#1565C0;border:1.5px solid #bbdefb !important}
.btn-tts:active{background:#e3f2fd}
.btn-tts.speaking{background:#e3f2fd;color:#0d47a1}
.btn-start{background:linear-gradient(135deg,#8B4513,#A0522D);color:#fff}
.btn-start:active{transform:scale(0.98)}

/* ===== 用户选择页样式 ===== */
.user-select-header{background:linear-gradient(135deg,#8B4513,#A0522D);color:#fff;text-align:center;padding:48px 16px 32px;border-radius:0 0 30px 30px}
.user-select-header h1{font-size:28px;margin:0;letter-spacing:3px}
.user-select-header p{font-size:14px;opacity:0.85;margin-top:8px}
.user-list{padding:24px 16px;flex:1;overflow-y:auto}
.user-list-title{font-size:16px;color:#666;margin-bottom:16px;text-align:center}
.user-card{background:#fff;border-radius:16px;padding:20px;margin-bottom:12px;display:flex;align-items:center;box-shadow:0 2px 12px rgba(0,0,0,0.08);cursor:pointer;transition:transform 0.15s}
.user-card:active{transform:scale(0.97)}
.user-card-avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#8B4513,#D2691E);display:flex;align-items:center;justify-content:center;font-size:32px;margin-right:16px;flex:none}
.user-card-info{flex:1}
.user-card-name{font-size:18px;font-weight:600;color:#333}
.user-card-stats{font-size:13px;color:#999;margin-top:4px}
.user-card-points{font-size:14px;color:#8B4513;font-weight:500;margin-top:2px}
.user-card-arrow{font-size:20px;color:#ccc;flex:none}
.add-user-card{background:#fff;border-radius:16px;padding:20px;margin-bottom:12px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,0.08);cursor:pointer;border:2px dashed #ddd;transition:all 0.15s}
.add-user-card:active{transform:scale(0.97);border-color:#8B4513}
.add-user-icon{width:56px;height:56px;border-radius:50%;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:32px;margin-right:16px;flex:none;color:#999}
.add-user-text{font-size:16px;color:#999;font-weight:500}

/* 用户创建弹窗 */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeIn 0.2s ease}
.modal-content{background:#fff;border-radius:20px;padding:32px 24px;width:90%;max-width:360px;animation:slideUp 0.3s ease}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-size:20px;font-weight:600;color:#333;text-align:center;margin-bottom:24px}
.modal-input{padding:14px 16px;border:1.5px solid #e0e0e0;border-radius:12px;font-size:16px;width:100%;outline:none;transition:border-color 0.2s;margin-bottom:16px}
.modal-input:focus{border-color:#8B4513}
.modal-hint{font-size:13px;color:#999;margin-bottom:20px;text-align:center}
.modal-avatar-select{display:flex;gap:12px;justify-content:center;margin-bottom:24px;flex-wrap:wrap}
.avatar-option{width:48px;height:48px;border-radius:50%;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;border:3px solid transparent;transition:all 0.15s}
.avatar-option.selected{border-color:#8B4513;background:#fdf6ee}
.modal-actions{display:flex;gap:12px}
.modal-btn{flex:1;padding:14px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s}
.modal-btn-cancel{background:#f5f5f5;color:#666}
.modal-btn-cancel:active{background:#e0e0e0}
.modal-btn-confirm{background:linear-gradient(135deg,#8B4513,#A0522D);color:#fff}
.modal-btn-confirm:active{transform:scale(0.98)}

/* 切换用户按钮 */
.switch-user-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.2);border:none;color:#fff;font-size:12px;padding:6px 12px;border-radius:20px;cursor:pointer;display:flex;align-items:center;gap:4px}
.switch-user-btn:active{background:rgba(255,255,255,0.3)}

/* 动画 */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.4s ease}

/* 通用 */
.hidden{display:none!important}
.text-center{text-align:center}
.mt-8{margin-top:8px}
.mt-16{margin-top:16px}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- ========== 用户选择页 ========== -->
  <div class="page" id="page-user-select">
    <div class="user-select-header">
      <h1>古诗词学习</h1>
      <p>游戏化闯关 · 轻松记经典</p>
    </div>
    <div class="user-list">
      <div class="user-list-title">选择您的学习账号</div>
      <div id="user-list-container"></div>
      <div class="add-user-card" onclick="showCreateUserModal()">
        <div class="add-user-icon">+</div>
        <div class="add-user-text">添加新用户</div>
      </div>
    </div>
  </div>

  <!-- ========== 首页 ========== -->
  <div class="page" id="page-home">
    <div class="home-header">
      <button class="switch-user-btn" onclick="goUserSelect()">
        <span id="current-user-avatar">📚</span>
        <span id="current-user-name">切换</span>
      </button>
      <h1>古诗词学习</h1>
      <p>游戏化闯关 · 轻松记经典</p>
      <!-- 总进度环 -->
      <div class="progress-ring" id="home-progress">0%</div>
      <!-- 今日学习 -->
      <div id="today-info" style="margin-top:12px;font-size:13px;opacity:0.9">今日已学 <b id="today-count">0</b> 题</div>
      <div id="today-bar-wrap" style="margin:8px 32px 0;height:6px;background:rgba(255,255,255,0.25);border-radius:3px;overflow:hidden">
        <div id="today-bar" style="height:100%;width:0%;background:#fff;border-radius:3px;transition:width 0.4s"></div>
      </div>
      <div id="today-goal" style="font-size:11px;opacity:0.7;margin-top:4px">每日目标：5 题</div>
    </div>
    <div class="module-grid" id="module-grid">
      <!-- JS 动态生成 -->
    </div>
  </div>

  <!-- ========== 列表页 ========== -->
  <div class="page" id="page-list">
    <div class="list-header">
      <button class="nav-back" onclick="goHome()" style="background:none;border:none;font-size:20px;cursor:pointer;padding:4px">←</button>
      <h2 id="list-title">诗词列表</h2>
    </div>
    <!-- 搜索框 -->
    <div class="search-container">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="search-input" placeholder="搜索诗词名称、作者、朝代..." oninput="handleSearch(this.value)">
        <span class="search-clear" id="search-clear" onclick="clearSearch()">✕</span>
      </div>
    </div>
    <div class="search-type-tabs">
      <button class="search-type-tab active" onclick="setSearchType('all')">全部</button>
      <button class="search-type-tab" onclick="setSearchType('title')">按名称</button>
      <button class="search-type-tab" onclick="setSearchType('author')">按作者</button>
      <button class="search-type-tab" onclick="setSearchType('dynasty')">按朝代</button>
    </div>
    <div class="search-result-count" id="search-result-count"></div>
    <div class="filter-tabs" id="filter-tabs"></div>
    <div class="list-scroll" id="list-scroll"></div>
  </div>

  <!-- ========== 诗词详情页 ========== -->
  <div class="page" id="page-detail">
    <div class="detail-header">
      <button class="nav-back" onclick="goList(state.currentModule)" style="background:none;border:none;font-size:20px;cursor:pointer;padding:4px">←</button>
      <h2 id="detail-title">诗句详情</h2>
    </div>
    <div class="detail-body" id="detail-body">
      <!-- JS 动态生成 -->
    </div>
    <div class="detail-actions">
      <button class="btn btn-tts" id="tts-btn" onclick="speakPoem()">🔊 朗读诗词</button>
      <button class="btn btn-start" onclick="startChallengeFromDetail()">🎯 开始闯关</button>
    </div>
  </div>

  <!-- ========== 闯关页 ========== -->
  <div class="page" id="page-challenge">
    <div class="challenge-header">
      <button style="background:none;border:none;font-size:20px;cursor:pointer;padding:4px" onclick="confirmLeave()">✕</button>
      <div class="challenge-progress"><div class="challenge-progress-fill" id="challenge-progress-fill" style="width:0%"></div></div>
      <div class="challenge-counter" id="challenge-counter">1/5</div>
    </div>
    <div class="question-card" id="question-card"></div>
    <div class="submit-section">
      <button class="submit-btn" id="submit-btn" disabled>提交答案</button>
    </div>
  </div>

  <!-- ========== 结果页 ========== -->
  <div class="page" id="page-result">

    <div class="modal-avatar-select" id="avatar-select"></div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" onclick="hideCreateUserModal()">取消</button>
      <button class="modal-btn modal-btn-confirm" onclick="createUser()">创建</button>

<script>
// =====================================================================
//  多用户管理系统
// =====================================================================
const AVATAR_OPTIONS = ['🧑💼', '👧', '👦', '👩', '🧓', '👴', '👩🦰', '👨🦱', '🧑🎓', '👩🏫'];

// 用户管理相关函数
function loadUsers() {
  const data = localStorage.getItem('gushici_users');
  return data ? JSON.parse(data) : null;
}

function saveUsers(users) {
  localStorage.setItem('gushici_users', JSON.stringify(users));
}

function getcurrentUserId() {
  return localStorage.getItem('gushici_current_user');
}

function setCurrentUserId(userId) {
  localStorage.setItem('gushici_current_user', userId);
}

function initializeUsers() {
  let usersData = loadUsers();
  
  // 如果没有用户数据，检查是否需要迁移旧数据
  if (!usersData) {
    usersData = {
      currentUserId: null,
      users: {},
      userOrder: []
    };
    
    // 检查是否有旧数据需要迁移
    const oldPoints = localStorage.getItem('gushici_points');
    const oldLearned = localStorage.getItem('gushici_learned');
    
    if (oldPoints !== null || oldLearned !== null) {
      // 创建默认用户并迁移数据
      const defaultUser = createDefaultUser('默认用户');
      usersData.users[defaultUser.id] = defaultUser;
      usersData.userOrder.push(defaultUser.id);
      usersData.currentUserId = defaultUser.id;
      
      // 迁移旧数据
      migrateOldData(defaultUser.id);
    }
    
    saveUsers(usersData);
  }
  
  return usersData;
}

function createDefaultUser(nickname) {
  const userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
  return {
    id: userId,
    nickname: nickname,
    avatar: AVATAR_OPTIONS[0],
    createdAt: new Date().toISOString(),
    points: 0,
    level: '童生',
    badges: [],
    learnedIds: [],
    todayCount: 0,
    todayDate: '',
    lastStudyDate: '',
    streakDays: 0,
    stats: { challenges: 0, bestScore: 0, totalStars: 0 }
  };
}

function migrateOldData(userId) {
  const userData = getUserData(userId);
  userData.points = parseInt(localStorage.getItem('gushici_points') || '0');
  userData.level = localStorage.getItem('gushici_level') || '童生';
  userData.badges = JSON.parse(localStorage.getItem('gushici_badges') || '[]');
  userData.learnedIds = JSON.parse(localStorage.getItem('gushici_learned') || '[]');
  userData.todayCount = parseInt(localStorage.getItem('gushici_today') || '0');
  userData.todayDate = localStorage.getItem('gushici_today_date') || '';
  userData.lastStudyDate = localStorage.getItem('gushici_last_study_date') || '';
  userData.streakDays = parseInt(localStorage.getItem('gushici_streak_days') || '0');
  userData.stats = JSON.parse(localStorage.getItem('gushici_stats') || '{"challenges":0,"bestScore":0,"totalStars":0}');
  saveUserData(userId, userData);
}

function getUserData(userId) {
  const key = 'gushici_userdata_' + userId;
  const data = localStorage.getItem(key);
  return data ? JSON.parse(data) : null;
}

function saveUserData(userId, userData) {
  const key = 'gushici_userdata_' + userId;
  localStorage.setItem(key, JSON.stringify(userData));
}

function addUser(nickname, avatar) {
  const usersData = loadUsers();
  const userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
  
  const newUser = {
    id: userId,
    nickname: nickname,
    avatar: avatar,
    createdAt: new Date().toISOString(),
    points: 0,
    level: '童生',
    badges: [],
    learnedIds: [],
    todayCount: 0,
    todayDate: '',
    lastStudyDate: '',
    streakDays: 0,
    stats: { challenges: 0, bestScore: 0, totalStars: 0 }
  };
  
  usersData.users[userId] = newUser;
  usersData.userOrder.push(userId);
  
  // 如果是第一个用户，自动设为当前用户
  if (usersData.userOrder.length === 1) {
    usersData.currentUserId = userId;
  }
  
  saveUsers(usersData);
  return userId;
}

function switchUser(userId) {
  // 新增：先保存当前用户数据
  const currentUserId = getcurrentUserId();
  if (currentUserId) {
    saveUserState(currentUserId);
  }
  
  const usersData = loadUsers();
  usersData.currentUserId = userId;
  saveUsers(usersData);
  setCurrentUserId(userId);
  
  // 加载用户数据到state
  loadUserState(userId);
}

function deleteUser(userId) {
  const usersData = loadUsers();
  
  // 不能删除最后一个用户
  if (usersData.userOrder.length <= 1) {
    alert('不能删除最后一个用户！');
    return false;
  }
  
  delete usersData.users[userId];
  usersData.userOrder = usersData.userOrder.filter(id => id !== userId);
  
  // 如果删除的是当前用户，切换到第一个用户
  if (usersData.currentUserId === userId) {
    usersData.currentUserId = usersData.userOrder[0];
    setCurrentUserId(usersData.userOrder[0]);
  }
  
  saveUsers(usersData);
  
  // 删除用户数据
  localStorage.removeItem('gushici_userdata_' + userId);
  
  return true;
}

function loadUserState(userId) {
  const userData = getUserData(userId);
  if (!userData) {
    // 如果用户数据不存在，创建默认数据
    const usersData = loadUsers();
    const user = usersData.users[userId];
    if (user) {
      const defaultData = {
        points: 0,
        level: '童生',
        badges: [],
        learnedIds: [],
        todayCount: 0,
        todayDate: '',
        lastStudyDate: '',
        streakDays: 0,
        stats: { challenges: 0, bestScore: 0, totalStars: 0 }
      };
      saveUserData(userId, defaultData);
      loadUserState(userId);
      return;
    }
  }
  
  // 更新state
  state.userPoints = userData.points || 0;
  state.userLevel = userData.level || '童生';
  state.badges = userData.badges || [];
  state.learnedIds = userData.learnedIds || [];
  state.todayCount = userData.todayCount || 0;
  state.todayDate = userData.todayDate || '';
  state.lastStudyDate = userData.lastStudyDate || '';
  state.streakDays = userData.streakDays || 0;
  state.stats = userData.stats || { challenges: 0, bestScore: 0, totalStars: 0 };
}

function saveUserState(userId) {
  const userData = {
    points: state.userPoints,
    level: state.userLevel,
    badges: state.badges,
    learnedIds: state.learnedIds,
    todayCount: state.todayCount,
    todayDate: state.todayDate,
    lastStudyDate: state.lastStudyDate,
    streakDays: state.streakDays,
    stats: state.stats
  };
  saveUserData(userId, userData);
}

// =====================================================================
//  用户选择页相关函数
// =====================================================================
function renderUserSelectPage() {
  const usersData = loadUsers();
  const container = document.getElementById('user-list-container');
  if (!container) return;
  
  container.innerHTML = '';
  
  usersData.userOrder.forEach(userId => {
    const user = usersData.users[userId];
    if (!user) return;
    
    const card = document.createElement('div');
    card.className = 'user-card';
    card.onclick = () => selectUser(userId);
    card.innerHTML = `
      <div class="user-card-avatar">${user.avatar}</div>
      <div class="user-card-info">
        <div class="user-card-name">${user.nickname}</div>
        <div class="user-card-stats">闯关 ${user.stats ? user.stats.challenges : 0} 次</div>
        <div class="user-card-points">${user.points || 0} 积分 · ${user.level || '童生'}</div>
      </div>
      <div class="user-card-arrow">→</div>
    `;
    container.appendChild(card);
  });
}

function selectUser(userId) {
  switchUser(userId);
  showPage('home');
  goHome();
}

function goUserSelect() {
  renderUserSelectPage();
  showPage('user-select');
}

function showCreateUserModal() {
  const modal = document.getElementById('create-user-modal');
  const input = document.getElementById('user-nickname-input');
  const avatarSelect = document.getElementById('avatar-select');
  
  if (modal) modal.classList.remove('hidden');
  if (input) {
    input.value = '';
    input.focus();
  }
  
  // 渲染头像选择
  if (avatarSelect) {
    avatarSelect.innerHTML = '';
    AVATAR_OPTIONS.forEach((avatar, idx) => {
      const opt = document.createElement('div');
      opt.className = 'avatar-option' + (idx === 0 ? ' selected' : '');
      opt.textContent = avatar;
      opt.dataset.avatar = avatar;
      opt.onclick = () => selectAvatar(avatar, opt);
      avatarSelect.appendChild(opt);
    });
  }
  
  selectedAvatar = AVATAR_OPTIONS[0];
}

function hideCreateUserModal() {
  const modal = document.getElementById('create-user-modal');
  if (modal) modal.classList.add('hidden');
}

let selectedAvatar = AVATAR_OPTIONS[0];

function selectAvatar(avatar, element) {
  selectedAvatar = avatar;
  document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
  if (element) element.classList.add('selected');
}

function createUser() {
  const input = document.getElementById('user-nickname-input');
  const nickname = input ? input.value.trim() : '';
  
  if (!nickname) {
    alert('请输入昵称！');
    return;
  }
  
  // 新增：长度检查
  if (nickname.length > 10) {
    alert('昵称不能超过10个字符！');
    return;
  }
  
  // 新增：特殊字符检查
  if (!/^[\u4e00-\u9fa5a-zA-Z0-9_]+$/.test(nickname)) {
    alert('昵称只能包含中文、字母、数字和下划线！');
    return;
  }
  
  // 新增：重复昵称检查
  const usersData = loadUsers();
  const duplicate = Object.values(usersData.users).some(u => u.nickname === nickname);
  if (duplicate) {
    alert('该昵称已被使用，请选择其他昵称！');
    return;
  }
  
  const userId = addUser(nickname, selectedAvatar);
  hideCreateUserModal();
  
  // 新增：成功提示
  alert('用户创建成功！');
  
  // 如果这是第一个用户，自动进入
  if (usersData.userOrder.length === 1) {
    switchUser(userId);
    showPage('home');
    goHome();
  } else {
    renderUserSelectPage();
  }
}

    {id:"tp022",title:"锦瑟",author:"李商隐",dynasty:"唐",content:["锦瑟无端五十弦，","一弦一柱思华年。","庄生晓梦迷蝴蝶，","望帝春心托杜鹃。"],difficulty:3},
    {id:"tp023",title:"乌衣巷",author:"刘禹锡",dynasty:"唐",content:["朱雀桥边野草花，","乌衣巷口夕阳斜。","旧时王谢堂前燕，","飞入寻常百姓家。"],difficulty:2},
    {id:"tp024",title:"望洞庭",author:"刘禹锡",dynasty:"唐",content:["湖光秋月两相和，","潭面无风镜未磨。","遥望洞庭山水翠，","白银盘里一青螺。"],difficulty:2},
    {id:"tp025",title:"送元二使安西",author:"王维",dynasty:"唐",content:["渭城朝雨浥轻尘，","客舍青青柳色新。","劝君更尽一杯酒，","西出阳关无故人。"],difficulty:1},
    {id:"tp026",title:"九月九日忆山东兄弟",author:"王维",dynasty:"唐",content:["独在异乡为异客，","每逢佳节倍思亲。","遥知兄弟登高处，","遍插茱萸少一人。"],difficulty:1},
    {id:"tp027",title:"使至塞上",author:"王维",dynasty:"唐",content:["单车欲问边，","属国过居延。","征蓬出汉塞，","归雁入胡天。","大漠孤烟直，","长河落日圆。"],difficulty:2},
    {id:"tp028",title:"早发白帝城",author:"李白",dynasty:"唐",content:["朝辞白帝彩云间，","千里江陵一日还。","两岸猿声啼不住，","轻舟已过万重山。"],difficulty:1},
    {id:"tp029",title:"赠汪伦",author:"李白",dynasty:"唐",content:["李白乘舟将欲行，","忽闻岸上踏歌声。","桃花潭水深千尺，","不及汪伦送我情。"],difficulty:1},
    {id:"tp030",title:"凉州词",author:"王翰",dynasty:"唐",content:["葡萄美酒夜光杯，","欲饮琵琶马上催。","醉卧沙场君莫笑，","古来征战几人回。"],difficulty:2},
    {id:"tp031",title:"将进酒",author:"李白",dynasty:"唐",content:["君不见黄河之水天上来，","奔流到海不复回。","君不见高堂明镜悲白发，","朝如青丝暮成雪。","人生得意须尽欢，","莫使金樽空对月。"],difficulty:3},
    {id:"tp032",title:"月下独酌（其二）",author:"李白",dynasty:"唐",content:["天若不爱酒，","酒星不在天。","地若不爱酒，","地应无酒泉。"],difficulty:3},
    {id:"tp033",title:"黄鹤楼",author:"崔颢",dynasty:"唐",content:["昔人已乘黄鹤去，","此地空余黄鹤楼。","黄鹤一去不复返，","白云千载空悠悠。"],difficulty:2},
    {id:"tp034",title:"长恨歌（节选）",author:"白居易",dynasty:"唐",content:["汉皇重色思倾国，","御宇多年求不得。","杨家有女初长成，","养在深闺人未识。"],difficulty:3},
    {id:"tp035",title:"琵琶行（节选）",author:"白居易",dynasty:"唐",content:["浔阳江头夜送客，","枫叶荻花秋瑟瑟。","主人下马客在船，","举酒欲饮无管弦。"],difficulty:3},
    {id:"tp036",title:"登高",author:"杜甫",dynasty:"唐",content:["风急天高猿啸哀，","渚清沙白鸟飞回。","无边落木萧萧下，","不尽长江滚滚来。"],difficulty:3},
    {id:"tp037",title:"茅屋为秋风所破歌（节选）",author:"杜甫",dynasty:"唐",content:["八月秋高风怒号，","卷我屋上三重茅。","茅飞渡江洒江郊，","高者挂罥长林梢。"],difficulty:3},
    {id:"tp038",title:"江南春",author:"杜牧",dynasty:"唐",content:["千里莺啼绿映红，","水村山郭酒旗风。","南朝四百八十寺，","多少楼台烟雨中。"],difficulty:2},
    {id:"tp039",title:"赤壁",author:"杜牧",dynasty:"唐",content:["折戟沉沙铁未销，","自将磨洗认前朝。","东风不与周郎便，","铜雀春深锁二乔。"],difficulty:2},
    {id:"tp040",title:"泊秦淮",author:"杜牧",dynasty:"唐",content:["烟笼寒水月笼沙，","夜泊秦淮近酒家。","商女不知亡国恨，","隔江犹唱后庭花。"],difficulty:2},
    {id:"tp041",title:"山行",author:"杜牧",dynasty:"唐",content:["远上寒山石径斜，","白云生处有人家。","停车坐爱枫林晚，","霜叶红于二月花。"],difficulty:1},
    {id:"tp042",title:"清明",author:"杜牧",dynasty:"唐",content:["清明时节雨纷纷，","路上行人欲断魂。","借问酒家何处有？","牧童遥指杏花村。"],difficulty:1},
    {id:"tp043",title:"秋夕",author:"杜牧",dynasty:"唐",content:["银烛秋光冷画屏，","轻罗小扇扑流萤。","天阶夜色凉如水，","卧看牵牛织女星。"],difficulty:2},
    {id:"tp044",title:"夜雨寄北",author:"李商隐",dynasty:"唐",content:["君问归期未有期，","巴山夜雨涨秋池。","何当共剪西窗烛，","却话巴山夜雨时。"],difficulty:2},
    {id:"tp045",title:"嫦娥",author:"李商隐",dynasty:"唐",content:["云母屏风烛影深，","长河渐落晓星沉。","嫦娥应悔偷灵药，","碧海青天夜夜心。"],difficulty:2},
    {id:"tp046",title:"贾生",author:"李商隐",dynasty:"唐",content:["宣室求贤访逐臣，","贾生才调更无伦。","可怜夜半虚前席，","不问苍生问鬼神。"],difficulty:2},
    {id:"tp047",title:"回乡偶书",author:"贺知章",dynasty:"唐",content:["少小离家老大回，","乡音无改鬓毛衰。","儿童相见不相识，","笑问客从何处来。"],difficulty:1},
    {id:"tp048",title:"咏柳",author:"贺知章",dynasty:"唐",content:["碧玉妆成一树高，","万条垂下绿丝绦。","不知细叶谁裁出，","二月春风似剪刀。"],difficulty:1},
    {id:"tp049",title:"登幽州台歌",author:"陈子昂",dynasty:"唐",content:["前不见古人，","后不见来者。","念天地之悠悠，","独怆然而涕下！"],difficulty:2},
    {id:"tp050",title:"春江花月夜（节选）",author:"张若虚",dynasty:"唐",content:["春江潮水连海平，","海上明月共潮生。","滟滟随波千万里，","何处春江无月明。"],difficulty:3},

    // ---- 继续添加唐诗（51-100首）----
    {id:"tp051",title:"鹿柴",author:"王维",dynasty:"唐",content:["空山不见人，","但闻人语响。","返景入深林，","复照青苔上。"],difficulty:1},
    {id:"tp052",title:"竹里馆",author:"王维",dynasty:"唐",content:["独坐幽篁里，","弹琴复长啸。","深林人不知，","明月来相照。"],difficulty:1},
    {id:"tp053",title:"送别",author:"王维",dynasty:"唐",content:["山中相送罢，","日暮掩柴扉。","春草明年绿，","王孙归不归？"],difficulty:1},
    {id:"tp054",title:"相思",author:"王维",dynasty:"唐",content:["红豆生南国，","春来发几枝。","愿君多采撷，","此物最相思。"],difficulty:1},
    {id:"tp055",title:"杂诗",author:"王维",dynasty:"唐",content:["君自故乡来，","应知故乡事。","来日绮窗前，","寒梅著花未？"],difficulty:1},
    {id:"tp056",title:"终南望余雪",author:"祖咏",dynasty:"唐",content:["终南阴岭秀，","积雪浮云端。","林表明霁色，","城中增暮寒。"],difficulty:2},
    {id:"tp057",title:"宿建德江",author:"孟浩然",dynasty:"唐",content:["移舟泊烟渚，","日暮客愁新。","野旷天低树，","江清月近人。"],difficulty:2},
    {id:"tp058",title:"过故人庄",author:"孟浩然",dynasty:"唐",content:["故人具鸡黍，","邀我至田家。","绿树村边合，","青山郭外斜。"],difficulty:2},
    {id:"tp059",title:"岁暮归南山",author:"孟浩然",dynasty:"唐",content:["北阙休上书，","南山归敝庐。","不才明主弃，","多病故人疏。"],difficulty:2},
    {id:"tp060",title:"夜归鹿门歌",author:"孟浩然",dynasty:"唐",content:["山寺钟鸣昼已昏，","渔梁渡头争渡喧。","人随沙岸向江村，","余亦乘舟归鹿门。"],difficulty:2},
    {id:"tp061",title:"次北固山下",author:"王湾",dynasty:"唐",content:["客路青山外，","行舟绿水前。","潮平两岸阔，","风正一帆悬。"],difficulty:2},
    {id:"tp062",title:"题破山寺后禅院",author:"常建",dynasty:"唐",content:["清晨入古寺，","初日照高林。","曲径通幽处，","禅房花木深。"],difficulty:2},
    {id:"tp063",title:"渡荆门送别",author:"李白",dynasty:"唐",content:["渡远荆门外，","来从楚国游。","山随平野尽，","江入大荒流。"],difficulty:2},
    {id:"tp064",title:"送友人",author:"李白",dynasty:"唐",content:["青山横北郭，","白水绕东城。","此地一为别，","孤蓬万里征。"],difficulty:2},
    {id:"tp065",title:"听蜀僧濬弹琴",author:"李白",dynasty:"唐",content:["蜀僧抱绿绮，","西下峨眉峰。","为我一挥手，","如听万壑松。"],difficulty:2},
    {id:"tp066",title:"子夜吴歌",author:"李白",dynasty:"唐",content:["长安一片月，","万户捣衣声。","秋风吹不尽，","总是玉关情。"],difficulty:2},
    {id:"tp067",title:"关山月（节选）",author:"李白",dynasty:"唐",content:["明月出天山，","苍茫云海间。","长风几万里，","吹度玉门关。"],difficulty:2},
    {id:"tp068",title:"别董大",author:"高适",dynasty:"唐",content:["千里黄云白日曛，","北风吹雁雪纷纷。","莫愁前路无知己，","天下谁人不识君。"],difficulty:2},
    {id:"tp069",title:"燕歌行（节选）",author:"高适",dynasty:"唐",content:["汉家烟尘在东北，","汉将辞家破残贼。","男儿本自重横行，","天子非常赐颜色。"],difficulty:3},
    {id:"tp070",title:"芙蓉楼送辛渐",author:"王昌龄",dynasty:"唐",content:["寒雨连江夜入吴，","平明送客楚山孤。","洛阳亲友如相问，","一片冰心在玉壶。"],difficulty:2},
    {id:"tp071",title:"从军行",author:"王昌龄",dynasty:"唐",content:["青海长云暗雪山，","孤城遥望玉门关。","黄沙百战穿金甲，","不破楼兰终不还。"],difficulty:2},
    {id:"tp072",title:"长信怨",author:"王昌龄",dynasty:"唐",content:["奉帚平明金殿开，","且将团扇共徘徊。","玉颜不及寒鸦色，","犹带昭阳日影来。"],difficulty:2},
    {id:"tp073",title:"闺怨",author:"王昌龄",dynasty:"唐",content:["闺中少妇不知愁，","春日凝妆上翠楼。","忽见陌头杨柳色，","悔教夫婿觅封侯。"],difficulty:2},
    {id:"tp074",title:"春宫曲",author:"王昌龄",dynasty:"唐",content:["昨夜风开露井桃，","未央前殿月轮高。","平阳歌舞新承宠，","帘外春寒赐锦袍。"],difficulty:2},
    {id:"tp075",title:"月夜",author:"杜甫",dynasty:"唐",content:["今夜鄜州月，","闺中只独看。","遥怜小儿女，","未解忆长安。"],difficulty:2},
    {id:"tp076",title:"春宿左省",author:"杜甫",dynasty:"唐",content:["花隐掖垣暮，","啾啾栖鸟过。","星临万户动，","月傍九霄多。"],difficulty:2},
    {id:"tp077",title:"月夜忆舍弟",author:"杜甫",dynasty:"唐",content:["戍鼓断人行，","边秋一雁声。","露从今夜白，","月是故乡明。"],difficulty:2},
    {id:"tp078",title:"天末怀李白",author:"杜甫",dynasty:"唐",content:["凉风起天末，","君子意如何？","鸿雁几时到，","江湖秋水多。"],difficulty:2},
    {id:"tp079",title:"奉济驿重送严公",author:"杜甫",dynasty:"唐",content:["远送从此别，","青山空复情。","几时杯重把，","昨夜月同行。"],difficulty:2},
    {id:"tp080",title:"别房太尉墓",author:"杜甫",dynasty:"唐",content:["他乡复行役，","驻马别孤坟。","近泪无干土，","低空有断云。"],difficulty:2},
    {id:"tp081",title:"旅夜书怀",author:"杜甫",dynasty:"唐",content:["细草微风岸，","危樯独夜舟。","星垂平野阔，","月涌大江流。"],difficulty:2},
    {id:"tp082",title:"登岳阳楼",author:"杜甫",dynasty:"唐",content:["昔闻洞庭水，","今上岳阳楼。","吴楚东南坼，","乾坤日夜浮。"],difficulty:2},
    {id:"tp083",title:"蜀相",author:"杜甫",dynasty:"唐",content:["丞相祠堂何处寻？","锦官城外柏森森。","映阶碧草自春色，","隔叶黄鹂空好音。"],difficulty:2},
    {id:"tp084",title:"客至",author:"杜甫",dynasty:"唐",content:["舍南舍北皆春水，","但见群鸥日日来。","花径不曾缘客扫，","蓬门今始为君开。"],difficulty:2},
    {id:"tp085",title:"野望",author:"杜甫",dynasty:"唐",content:["西山白雪三城戍，","南浦清江万里桥。","海内风尘诸弟隔，","天涯涕泪一身遥。"],difficulty:2},
    {id:"tp086",title:"闻官军收河南河北",author:"杜甫",dynasty:"唐",content:["剑外忽传收蓟北，","初闻涕泪满衣裳。","却看妻子愁何在，","漫卷诗书喜欲狂。"],difficulty:2},
    {id:"tp087",title:"登高",author:"杜甫",dynasty:"唐",content:["风急天高猿啸哀，","渚清沙白鸟飞回。","无边落木萧萧下，","不尽长江滚滚来。"],difficulty:3},
    {id:"tp088",title:"登楼",author:"杜甫",dynasty:"唐",content:["花近高楼伤客心，","万方多难此登临。","锦江春色来天地，","玉垒浮云变古今。"],difficulty:3},
    {id:"tp089",title:"宿府",author:"杜甫",dynasty:"唐",content:["清秋幕府井梧寒，","独宿江城蜡炬残。","永夜角声悲自语，","中天月色好谁看。"],difficulty:2},
    {id:"tp090",title:"阁夜",author:"杜甫",dynasty:"唐",content:["岁暮阴阳催短景，","天涯霜雪霁寒宵。","五更鼓角声悲壮，","三峡星河影动摇。"],difficulty:3},
    {id:"tp091",title:"咏怀古迹（其一）",author:"杜甫",dynasty:"唐",content:["支离东北风尘际，","漂泊西南天地间。","三峡楼台淹日月，","五溪衣服共云山。"],difficulty:3},
    {id:"tp092",title:"咏怀古迹（其二）",author:"杜甫",dynasty:"唐",content:["摇落深知宋玉悲，","风流儒雅亦吾师。","怅望千秋一洒泪，","萧条异代不同时。"],difficulty:3},
    {id:"tp093",title:"咏怀古迹（其三）",author:"杜甫",dynasty:"唐",content:["群山万壑赴荆门，","生长明妃尚有村。","一去紫台连朔漠，","独留青冢向黄昏。"],difficulty:3},
    {id:"tp094",title:"咏怀古迹（其四）",author:"杜甫",dynasty:"唐",content:["蜀主窥吴幸三峡，","崩年亦在永安宫。","翠华想像空山里，","玉殿虚无野寺中。"],difficulty:3},
    {id:"tp095",title:"咏怀古迹（其五）",author:"杜甫",dynasty:"唐",content:["诸葛大名垂宇宙，","宗臣遗像肃清高。","三分割据纡筹策，","万古云霄一羽毛。"],difficulty:3},
    {id:"tp096",title:"八阵图",author:"杜甫",dynasty:"唐",content:["功盖三分国，","名成八阵图。","江流石不转，","遗恨失吞吴。"],difficulty:2},
    {id:"tp097",title:"江南逢李龟年",author:"杜甫",dynasty:"唐",content:["岐王宅里寻常见，","崔九堂前几度闻。","正是江南好风景，","落花时节又逢君。"],difficulty:1},
    {id:"tp098",title:"赠花卿",author:"杜甫",dynasty:"唐",content:["锦城丝管日纷纷，","半入江风半入云。","此曲只应天上有，","人间能得几回闻。"],difficulty:2},
    {id:"tp099",title:"江畔独步寻花",author:"杜甫",dynasty:"唐",content:["黄四娘家花满蹊，","千朵万朵压枝低。","留连戏蝶时时舞，","自在娇莺恰恰啼。"],difficulty:1},
    {id:"tp100",title:"望岳",author:"杜甫",dynasty:"唐",content:["岱宗夫如何？","齐鲁青未了。","造化钟神秀，","阴阳割昏晓。","荡胸生曾云，","决眦入归鸟。","会当凌绝顶，","一览众山小。"],difficulty:2}
  ],

  // ---- 声律启蒙（上卷） ----
  "shenglv-qimeng": [
    {id:"sl001",title:"一东（其一）",content:["云对雨，雪对风，晚照对晴空。","来鸿对去燕，宿鸟对鸣虫。","三尺剑，六钧弓，岭北对江东。","人间清暑殿，天上广寒宫。","两岸晓烟杨柳绿，一园春雨杏花红。","两鬓风霜，途次早行之客；一蓑烟雨，溪边晚钓之翁。"],difficulty:2},
    {id:"sl002",title:"一东（其二）",content:["沿对革，异对同，白叟对黄童。","江风对海雾，牧子对渔翁。","颜巷陋，阮途穷，冀北对辽东。","池中濯足水，门外打头风。","梁帝讲经同泰寺，汉皇置酒未央宫。","尘虑萦心，懒抚七弦绿绮；霜华满鬓，羞看百炼青铜。"],difficulty:2},
    {id:"sl003",title:"二冬（其一）",content:["春对夏，秋对冬，暮鼓对晨钟。","观山对玩水，绿竹对苍松。","冯妇虎，叶公龙，舞蝶对鸣蛩。","衔泥双紫燕，课蜜几黄蜂。","春日园中莺恰恰，秋天塞外雁雍雍。","秦岭云横，迢递八千远路；巫山雨洗，嵯峨十二危峰。"],difficulty:2},
    {id:"sl004",title:"三江（其一）",content:["楼对阁，户对窗，巨海对长江。","蓉裳对蕙帐，玉斝对银釭。","青布幔，碧油幢，宝剑对金缸。","忠心安社稷，利口覆家邦。","世祖中兴延马武，桀王失道杀龙逄。","秋雨潇潇，漫烂黄花都满径；春风袅袅，扶疏绿竹正盈窗。"],difficulty:2},
    {id:"sl005",title:"四支（其一）",content:["泉对石，干对枝，吹竹对弹丝。","山亭对水榭，鹦鹉对鸬鹚。","五色笔，十香词，泼墨对传卮。","神奇韩干画，雄浑李陵诗。","几处花街新夺锦，有人香径淡凝脂。","万里烽烟，战士边头争报捷；一犁膏雨，农夫村外尽乘时。"],difficulty:2},
    {id:"sl006",title:"五微（其一）",content:["贤对圣，是对非，觉奥对参微。","鱼书对雁字，草舍对柴扉。","鸡晓唱，雉朝飞，红瘦对绿肥。","举杯邀月饮，骑马踏花归。","黄盖能成赤壁捷，陈平善解白登危。","太白书堂，瀑泉垂地三千丈；孔明祀庙，老柏参天四十围。"],difficulty:2},
    {id:"sl007",title:"六鱼（其一）",content:["羹对饭，柳对榆，短袖对长裾。","鸡冠对凤尾，芍药对芙蕖。","周有若，汉相如，王屋对匡庐。","月明山寺远，风细水亭虚。","壮士腰间三尺剑，男儿腹内五车书。"],difficulty:2},
    {id:"sl008",title:"七虞（其一）",content:["红对白，有对无，布谷对提壶。","毛椎对羽扇，天阙对皇都。","寻芳步，立雪途，马迹对车轮。","风入袂，月盈湖，击铜壶。","百年诗礼延余庆，万里风云入壮图。","能辨明伦，死矣野哉悲季路；不由径窦，生乎愚也有高徂。"],difficulty:3},
    {id:"sl009",title:"八齐（其一）",content:["鸾对凤，犬对鸡，塞北对关西。","长生对益智，老幼对旄倪。","颁竹策，剪桐圭，剥枣对蒸梨。","绵腰如细柳，嫩手似柔荑。","狡兔能穿三穴隐，鹪鹩权借一枝栖。"],difficulty:2},
    {id:"sl010",title:"九佳（其一）",content:["门对户，陌对街，枝叶对根荄。","斗鸡对挥麈，凤髻对鸾钗。","登楚岫，渡秦淮，子犯对夫差。","石鼎龙头缩，银筝雁翅排。","百年诗礼延余庆，万里风云入壮怀。"],difficulty:3}
  ],

  // ---- 千字文 ----
  "qianzi-wen": [
    {id:"qz001",title:"千字文（天地玄黄）",content:["天地玄黄，宇宙洪荒。","日月盈昃，辰宿列张。","寒来暑往，秋收冬藏。","闰余成岁，律吕调阳。"],pinyin:["tiān dì xuán huáng ， yǔ zhòu hóng huāng 。","rì yuè yíng zè ， chén xiù liè zhāng 。","hán lái shǔ wǎng ， qiū shōu dōng cáng 。","rùn yú chéng suì ， lǜ lǚ tiáo yáng 。"],difficulty:2},
    {id:"qz002",title:"千字文（云腾致雨）",content:["云腾致雨，露结为霜。","金生丽水，玉出昆冈。","剑号巨阙，珠称夜光。","果珍李柰，菜重芥姜。"],pinyin:["yún téng zhì yǔ ， lù jié wéi shuāng 。","jīn shēng lí shuǐ ， yù chū kūn gāng 。","jiàn hào jù què ， zhū chēng yè guāng 。","guǒ zhēn lǐ nài ， cài zhòng jiè jiāng 。"],difficulty:2},
    {id:"qz003",title:"千字文（海咸河淡）",content:["海咸河淡，鳞潜羽翔。","龙师火帝，鸟官人皇。","始制文字，乃服衣裳。","推位让国，有虞陶唐。"],pinyin:["hǎi xián hé dàn ， lín qián yǔ xiáng 。","lóng shī huǒ dì ， niǎo guān rén huáng 。","shǐ zhì wén zì ， nǎi fú yī shang 。","tuī wèi ràng guó ， yǒu yú táo táng 。"],difficulty:2},
    {id:"qz004",title:"千字文（吊民伐罪）",content:["吊民伐罪，周发殷汤。","坐朝问道，垂拱平章。","爱育黎首，臣伏戎羌。","遐迩一体，率宾归王。"],pinyin:["diào mín fá zuì ， zhōu fā yīn tāng 。","zuò cháo wèn dào ， chuí gǒng píng zhāng 。","ài yù lí shǒu ， chén fú róng qiāng 。","xiá ěr yī tǐ ， shuài bīn guī wáng 。"],difficulty:2},
    {id:"qz005",title:"千字文（鸣凤在竹）",content:["鸣凤在竹，白驹食场。","化被草木，赖及万方。","盖此身发，四大五常。","恭惟鞠养，岂敢毁伤。"],pinyin:["míng fèng zài zhú ， bái jū shí chǎng 。","huà bèi cǎo mù ， lài jí wàn fāng 。","gài cǐ shēn fà ， sì dà wǔ cháng 。","gōng wéi jū yǎng ， qǐ gǎn huǐ shāng 。"],difficulty:2},
    {id:"qz006",title:"千字文（女慕贞洁）",content:["女慕贞洁，男效才良。","知过必改，得能莫忘。","罔谈彼短，靡恃己长。","信使可复，器欲难量。"],pinyin:["nǚ mù zhēn jié ， nán xiào cái liáng 。","zhī guò bì gǎi ， dé néng mò wàng 。","wǎng tán bǐ duǎn ， mǐ shì jǐ cháng 。","xìn shǐ kě fù ， qì yù nán liáng 。"],difficulty:2},
    {id:"qz007",title:"千字文（墨悲丝染）",content:["墨悲丝染，诗赞羔羊。","景行维贤，克念作圣。","德建名立，形端表正。","空谷传声，虚堂习听。"],pinyin:["mò bēi sī rǎn ， shī zàn gāo yáng 。","jǐng xíng wéi xián ， kè niàn zuò shèng 。","dé jiàn míng lì ， xíng duān biǎo zhèng 。","kōng gǔ chuán shēng ， xū táng xí tīng 。"],difficulty:2},
    {id:"qz008",title:"千字文（祸因恶积）",content:["祸因恶积，福缘善庆。","尺璧非宝，寸阴是竞。","资父事君，曰严与敬。","孝当竭力，忠则尽命。"],pinyin:["huò yīn è jī ， fú yuán shàn qìng 。","chǐ bì fēi bǎo ， cùn yīn shì jìng 。","zī fù shì jūn ， yuē yán yǔ jìng 。","xiào dāng jié lì ， zhōng zé jìn mìng 。"],difficulty:2},
    {id:"qz009",title:"千字文（临深履薄）",content:["临深履薄，夙兴温凊。","似兰斯馨，如松之盛。","川流不息，渊澄取映。","容止若思，言辞安定。"],pinyin:["lín shēn lǚ bó ， sù xīng wēn jìng 。","sì lán sī xīn ， rú sōng zhī shèng 。","chuān liú bù xī ， yuān chéng qǔ yìng 。","róng zhǐ ruò sī ， yán cí ān dìng 。"],difficulty:2},
    {id:"qz010",title:"千字文（笃初诚美）",content:["笃初诚美，慎终宜令。","荣业所基，籍甚无竟。","学优登仕，摄职从政。","存以甘棠，去而益咏。"],pinyin:["dǔ chū chéng měi ， shèn zhōng yí lìng 。","róng yè suǒ jī ， jí shèn wú jìng 。","xué yōu dēng shì ， shè zhí cóng zhèng 。","cún yǐ gān táng ， qù ér yì yǒng 。"],difficulty:2},
    {id:"qz011",title:"千字文（乐殊贵贱）",content:["乐殊贵贱，礼别尊卑。","上和下睦，夫唱妇随。","外受傅训，入奉母仪。","诸姑伯叔，犹子比儿。"],pinyin:["yuè shū guì jiàn ， lǐ bié zūn bēi 。","shàng hé xià mù ， fū chàng fù suí 。","wài shòu fù xùn ， rù fèng mǔ yí 。","zhū gū bó shū ， yóu zǐ bǐ ér 。"],difficulty:2},
    {id:"qz012",title:"千字文（孔怀兄弟）",content:["孔怀兄弟，同气连枝。","交友投分，切磨箴规。","仁慈隐恻，造次弗离。","节义廉退，颠沛匪亏。"],pinyin:["kǒng huái xiōng dì ， tóng qì lián zhī 。","jiāo yǒu tóu fèn ， qiè mó zhēn guī 。","rén cí yǐn cè ， zào cì fú lí 。","jié yì lián tuì ， diān pèi fěi kuī 。"],difficulty:3},
    {id:"qz013",title:"千字文（性静情逸）",content:["性静情逸，心动神疲。","守真志满，逐物意移。","坚持雅操，好爵自縻。","都邑华夏，东西二京。"],pinyin:["xìng jìng qíng yì ， xīn dòng shén pí 。","shǒu zhēn zhì mǎn ， zhú wù yì yí 。","jiān chí yǎ cāo ， hǎo jué zì mí 。","dū yì huá xià ， dōng xī èr jīng 。"],difficulty:3},
    {id:"qz014",title:"千字文（背邙面洛）",content:["背邙面洛，浮渭据泾。","宫殿盘郁，楼观飞惊。","图写禽兽，画彩仙灵。","丙舍旁启，甲帐对楹。"],pinyin:["bèi máng miàn luò ， fú wèi jù jīng 。","gōng diàn pán yù ， lóu guān fēi jīng 。","tú xiě qín shòu ， huà cǎi xiān líng 。","bǐng shè páng qǐ ， jiǎ zhàng duì yíng 。"],difficulty:3},
    {id:"qz015",title:"千字文（肆筵设席）",content:["肆筵设席，鼓瑟吹笙。","升阶纳陛，弁转疑星。","右通广内，左达承明。","既集坟典，亦聚群英。"],pinyin:["sì yán shè xí ， gǔ sè chuī shēng 。","shēng jiē nà bì ， biàn zhuǎn yí xīng 。","yòu tōng guǎng nèi ， zuǒ dá chéng míng 。","jì jí fén diǎn ， yì jù qún yīng 。"],difficulty:3},
    {id:"qz016",title:"千字文（杜稿钟隶）",content:["杜稿钟隶，漆书壁经。","府罗将相，路侠槐卿。","户封八县，家给千兵。","高冠陪辇，驱毂振缨。"],pinyin:["dù gǎo zhōng lì ， qī shū bì jīng 。","fǔ luó jiāng xiàng ， lù xiá huái qīng 。","hù fēng bā xiàn ， jiā jǐ qiān bīng 。","gāo guān péi niǎn ， qū gǔ zhèn yīng 。"],difficulty:3},
    {id:"qz017",title:"千字文（世禄侈富）",content:["世禄侈富，车驾肥轻。","策功茂实，勒碑刻铭。","盘溪伊尹，佐时阿衡。","奄宅曲阜，微旦孰营。"],pinyin:["shì lù chǐ fù ， chē jià féi qīng 。","cè gōng mào shí ， lè bēi kè míng 。","pán xī yī yǐn ， zuǒ shí ā héng 。","yǎn zhái qū fù ， wēi dàn shú yíng 。"],difficulty:3},
    {id:"qz018",title:"千字文（桓公匡合）",content:["桓公匡合，济弱扶倾。","绮回汉惠，说感武丁。","俊乂密勿，多士实宁。","晋楚更霸，赵魏困横。"],pinyin:["huán gōng kuāng hé ， jì ruò fú qīng 。","qǐ huí hàn huì ， yuè gǎn wǔ dīng 。","jùn yì mì wù ， duō shì shí níng 。","jìn chǔ gēng bà ， zhào wèi kùn héng 。"],difficulty:3},
    {id:"qz019",title:"千字文（假途灭虢）",content:["假途灭虢，践土会盟。","何遵约法，韩弊烦刑。","起翦颇牧，用军最精。","宣威沙漠，驰誉丹青。"],pinyin:["jiǎ tú miè guó ， jiàn tǔ huì méng 。","hé zūn yuē fǎ ， hán bì fán xíng 。","qǐ jiǎn pō mù ， yòng jūn zuì jīng 。","xuān wēi shā mò ， chí yù dān qīng 。"],difficulty:3},
    {id:"qz020",title:"千字文（九州禹迹）",content:["九州禹迹，百郡秦并。","岳宗泰岱，禅主云亭。","雁门紫塞，鸡田赤城。","昆池碣石，巨野洞庭。"],pinyin:["jiǔ zhōu yǔ jì ， bǎi jùn qín bìng 。","yuè zōng tài dài ， shàn zhǔ yún tíng 。","yàn mén zǐ sài ， jī tián chì chéng 。","kūn chí jié shí ， jù yě dòng tíng 。"],difficulty:3},
    {id:"qz021",title:"千字文（旷远绵邈）",content:["旷远绵邈，岩岫杳冥。","治本于农，务兹稼穑。","俶载南亩，我艺黍稷。","税熟贡新，劝赏黜陟。"],pinyin:["kuàng yuǎn mián miǎo ， yán xiù yǎo míng 。","zhì běn yú nóng ， wù zī jià sè 。","chù zài nán mǔ ， wǒ yì shǔ jì 。","shuì shú gòng xīn ， quàn shǎng chù zhì 。"],difficulty:3},
    {id:"qz022",title:"千字文（孟轲敦素）",content:["孟轲敦素，史鱼秉直。","庶几中庸，劳谦谨敕。","聆音察理，鉴貌辨色。","贻厥嘉猷，勉其祗植。"],pinyin:["mèng kē dūn sù ， shǐ yú bǐng zhí 。","shù jī zhōng yǒng ， láo qiān jǐn chì 。","líng yīn chá lǐ ， jiàn mào biàn sè 。","yí jué jiā yóu ， miǎn qí zhī zhí 。"],difficulty:3},
    {id:"qz023",title:"千字文（省躬讥诫）",content:["省躬讥诫，宠增抗极。","殆辱近耻，林皋幸即。","两疏见机，解组谁逼。","索居闲处，沉默寂寥。"],pinyin:["xǐng gōng jī jiè ， chǒng zēng kàng jí 。","dài rǔ jìn chǐ ， lín gāo xìng jí 。","liǎng shū jiàn jī ， jiě zǔ shuí bī 。","suǒ jū xián chù ， chén mò jì liáo 。"],difficulty:3},
    {id:"qz024",title:"千字文（求古寻论）",content:["求古寻论，散虑逍遥。","欣奏累遣，戚谢欢招。","渠荷的历，园莽抽条。","枇杷晚翠，梧桐蚤凋。"],pinyin:["qiú gǔ xún lùn ， sàn lǜ xiāo yáo 。","xīn zòu lèi qiǎn ， qī xiè huān zhāo 。","qú hé de lì ， yuán mǎng chōu tiáo 。","pí pá wǎn cuì ， wú tóng zǎo diāo 。"],difficulty:3},
    {id:"qz025",title:"千字文（陈根委翳）",content:["陈根委翳，落叶飘摇。","游鹍独运，凌摩绛霄。","耽读玩市，寓目囊箱。","易輶攸畏，属耳垣墙。"],pinyin:["chén gēn wěi yì ， luò yè piāo yáo 。","yóu kūn dú yùn ， líng mó jiàng xiāo 。","dān dú wán shì ， yù mù náng xiāng 。","yì yóu yōu wèi ， zhǔ ěr yuán qiáng 。"],difficulty:3},
    {id:"qz026",title:"千字文（具膳餐饭）",content:["具膳餐饭，适口充肠。","饱饫烹宰，饥厌糟糠。","亲戚故旧，老少异粮。","妾御绩纺，侍巾帷房。"],pinyin:["jù shàn cān fàn ， shì kǒu chōng cháng 。","bǎo yù pēng zǎi ， jī yàn zāo kāng 。","qīn qī gù jiù ， lǎo shào yì liáng 。","qiè yù jì fǎng ， shì jīn wéi fáng 。"],difficulty:3},
    {id:"qz027",title:"千字文（纨扇圆洁）",content:["纨扇圆洁，银烛炜煌。","昼眠夕寐，蓝笋象床。","弦歌酒宴，接杯举觞。","矫手顿足，悦豫且康。"],pinyin:["wán shàn yuán jié ， yín zhú wěi huáng 。","zhòu mián xī mèi ， lán sǔn xiàng chuáng 。","xián gē jiǔ yàn ， jiē bēi jǔ shāng 。","jiǎo shǒu dùn zú ， yuè yù qiě kāng 。"],difficulty:3},
    {id:"qz028",title:"千字文（嫡后嗣续）",content:["嫡后嗣续，祭祀烝尝。","稽颡再拜，悚惧恐惶。","笺牒简要，顾答审详。","骸垢想浴，执热愿凉。"],pinyin:["dí hòu sì xù ， jì sì zhēng cháng 。","qǐ sǎng zài bài ， sǒng jù kǒng huáng 。","jiān dié jiǎn yào ， gù dá shěn xiáng 。","hái gòu xiǎng yù ， zhí rè yuàn liáng 。"],difficulty:3},
    {id:"qz029",title:"千字文（驴骡犊特）",content:["驴骡犊特，骇跃超骧。","诛斩贼盗，捕获叛亡。","布射僚丸，嵇琴阮啸。","恬笔伦纸，钧巧任钓。"],pinyin:["lǘ luó dú tè ， hài yuè chāo xiāng 。","zhū zhǎn zéi dào ， bǔ huò pàn wáng 。","bù shè liáo wán ， jī qín ruǎn xiào 。","tián bǐ lún zhǐ ， jūn qiǎo rén diào 。"],difficulty:3},
    {id:"qz030",title:"千字文（释纷利俗）",content:["释纷利俗，并皆佳妙。","毛施淑姿，工颦妍笑。","年矢每催，曦晖朗曜。","璇玑悬斡，晦魄环照。"],pinyin:["shì fēn lì sú ， bìng jiē jiā miào 。","máo shī shū zī ， gōng pín yán xiào 。","nián shǐ měi cuī ， xī huī lǎng yào 。","xuán jī xuán wò ， huì pò huán zhào 。"],difficulty:3},
    {id:"qz031",title:"千字文（指薪修祜）",content:["指薪修祜，永绥吉劭。","矩步引领，俯仰廊庙。","束带矜庄，徘徊瞻眺。","孤陋寡闻，愚蒙等诮。"],pinyin:["zhǐ xīn xiū hù ， yǒng suí jí shào 。","jǔ bù yǐn lǐng ， fǔ yǎng láng miào 。","shù dài jīn zhuāng ， pái huái zhān tiào 。","gū lòu guǎ wén ， yú méng děng qiào 。"],difficulty:3},

  // ---- 三字经 ----

    {id:"sj001",title:"三字经（人之初）",content:["人之初，性本善。性相近，习相远。","苟不教，性乃迁。教之道，贵以专。","昔孟母，择邻处。子不学，断机杼。","窦燕山，有义方。教五子，名俱扬。"],difficulty:1},
    {id:"sj002",title:"三字经（养不教）",content:["养不教，父之过。教不严，师之惰。","子不学，非所宜。幼不学，老何为。","玉不琢，不成器。人不学，不知义。","为人子，方少时。亲师友，习礼仪。"],difficulty:1},
    {id:"sj003",title:"三字经（香九龄）",content:["香九龄，能温席。孝于亲，所当执。","融四岁，能让梨。弟于长，宜先知。","首孝悌，次见闻。知某数，识某文。","一而十，十而百。百而千，千而万。"],difficulty:1},
    {id:"sj004",title:"三字经（三才者）",content:["三才者，天地人。三光者，日月星。","三纲者，君臣义。父子亲，夫妇顺。","曰春夏，曰秋冬。此四时，运不穷。","曰南北，曰西东。此四方，应乎中。"],difficulty:1},
    {id:"sj005",title:"三字经（曰水火）",content:["曰水火，木金土。此五行，本乎数。","曰仁义，礼智信。此五常，不容紊。","稻粱菽，麦黍稷。此六谷，人所食。","马牛羊，鸡犬豕。此六畜，人所饲。"],difficulty:1},
    {id:"sj006",title:"三字经（曰喜怒）",content:["曰喜怒，曰哀惧。爱恶欲，七情具。","匏土革，木石金。丝与竹，乃八音。","高曾祖，父而身。身而子，子而孙。","自子孙，至玄曾。乃九族，人之伦。"],difficulty:2},
    {id:"sj007",title:"三字经（凡训蒙）",content:["凡训蒙，须讲究。详训诂，明句读。","为学者，必有初。小学终，至四书。","论语者，二十篇。群弟子，记善言。","孟子者，七篇止。讲道德，说仁义。"],difficulty:2},
    {id:"sj008",title:"三字经（作中庸）",content:["作中庸，子思笔。中不偏，庸不易。","作大学，乃曾子。自修齐，至平治。","孝经通，四书熟。如六经，始可读。","诗书易，礼春秋。号六经，当讲求。"],difficulty:2}

    {id:"dg002",title:"弟子规（入则孝·一）",content:["父母呼，应勿缓。","父母命，行勿懒。","父母教，须敬听。","父母责，须顺承。"],pinyin:["fù mǔ hū ， yìng wù huǎn 。","fù mǔ mìng ， xíng wù lǎn 。","fù mǔ jiào ， xū jìng tīng 。","fù mǔ zé ， xū shùn chéng 。"],difficulty:1},
    {id:"dg003",title:"弟子规（入则孝·二）",content:["冬则温，夏则凊。","晨则省，昏则定。","出必告，反必面。","居有常，业无变。"],pinyin:["dōng zé wēn ， xià zé jìng 。","chén zé xǐng ， hūn zé dìng 。","chū bì gào ， fǎn bì miàn 。","jū yǒu cháng ， yè wú biàn 。"],difficulty:1},
    {id:"dg004",title:"弟子规（入则孝·三）",content:["事虽小，勿擅为。","苟擅为，子道亏。","物虽小，勿私藏。","苟私藏，亲心伤。"],pinyin:["shì suī xiǎo ， wù shàn wéi 。","gǒu shàn wéi ， zǐ dào kuī 。","wù suī xiǎo ， wù sī cáng 。","gǒu sī cáng ， qīn xīn shāng 。"],difficulty:1},

    {id:"dg006",title:"弟子规（入则孝·五）",content:["亲爱我，孝何难。","亲憎我，孝方贤。","亲有过，谏使更。","怡吾色，柔吾声。"],pinyin:["qīn ài wǒ ， xiào hé nán 。","qīn zēng wǒ ， xiào fāng xián 。","qīn yǒu guò ， jiàn shǐ gēng 。","yí wú sè ， róu wú shēng 。"],difficulty:2},

    {id:"dg008",title:"弟子规（出则悌·一）",content:["兄道友，弟道恭。","兄弟睦，孝在中。","财物轻，怨何生。","言语忍，忿自泯。"],pinyin:["xiōng dào yǒu ， dì dào gōng 。","xiōng dì mù ， xiào zài zhōng 。","cái wù qīng ， yuàn hé shēng 。","yán yǔ rěn ， fèn zì mǐn 。"],difficulty:1},
    {id:"dg009",title:"弟子规（出则悌·二）",content:["或饮食，或坐走。","长者先，幼者后。","长呼人，即代叫。","人不在，己即到。"],pinyin:["huò yǐn shí ， huò zuò zǒu 。","zhǎng zhě xiān ， yòu zhě hòu 。","zhǎng hū rén ， jí dài jiào 。","rén bù zài ， jǐ jí dào 。"],difficulty:1},
    {id:"dg010",title:"弟子规（谨·一）",content:["朝起早，夜眠迟。","老易至，惜此时。","晨必盥，兼漱口。","便溺回，辄净手。"],pinyin:["zhāo qǐ zǎo ， yè mián chí 。","lǎo yì zhì ， xī cǐ shí 。","chén bì guàn ， jiān shù kǒu 。","biàn nì huí ， zhé jìng shǒu 。"],difficulty:1},
    {id:"dg011",title:"弟子规（谨·二）",content:["冠必正，纽必结。","袜与履，俱紧切。","置冠服，有定位。","勿乱顿，致污秽。"],pinyin:["guān bì zhèng ， niǔ bì jié 。","wà yǔ lǚ ， jù jǐn qiè 。","zhì guān fú ， yǒu dìng wèi 。","wù luàn dùn ， zhì wū huì 。"],difficulty:1},
    {id:"dg012",title:"弟子规（谨·三）",content:["衣贵洁，不贵华。","上循分，下称家。","对饮食，勿拣择。","食适可，勿过则。"],pinyin:["yī guì jié ， bù guì huá 。","shàng xún fèn ， xià chèn jiā 。","duì yǐn shí ， wù jiǎn zé 。","shí shì kě ， wù guò zé 。"],difficulty:1},
    {id:"dg013",title:"弟子规（信·一）",content:["凡出言，信为先。","诈与妄，奚可焉。","话说多，不如少。","惟其是，勿佞巧。"],pinyin:["fán chū yán ， xìn wéi xiān 。","zhà yǔ wàng ， xī kě yān 。","huà shuō duō ， bù rú shǎo 。","wéi qí shì ， wù nìng qiǎo 。"],difficulty:2},
    {id:"dg014",title:"弟子规（信·二）",content:["奸巧语，秽污词。","市井气，切戒之。","见未真，勿轻言。","知未的，勿轻传。"],pinyin:["jiān qiǎo yǔ ， huì wū cí 。","shì jǐng qì ， qiè jiè zhī 。","jiàn wèi zhēn ， wù qīng yán 。","zhī wèi dí ， wù qīng chuán 。"],difficulty:2},
    {id:"dg015",title:"弟子规（泛爱众·一）",content:["凡是人，皆须爱。","天同覆，地同载。","行高者，名自高。","人所重，非貌高。"],pinyin:["fán shì rén ， jiē xū ài 。","tiān tóng fù ， dì tóng zǎi 。","xíng gāo zhě ， míng zì gāo 。","rén suǒ zhòng ， fēi mào gāo 。"],difficulty:2},
    {id:"dg016",title:"弟子规（泛爱众·二）",content:["才大者，望自大。","人所服，非言大。","己有能，勿自私。","人所能，勿轻訾。"],pinyin:["cái dà zhě ， wàng zì dà 。","rén suǒ fú ， fēi yán dà 。","jǐ yǒu néng ， wù zì sī 。","rén suǒ néng ， wù qīng zī 。"],difficulty:2},
    {id:"dg017",title:"弟子规（亲仁）",content:["同是人，类不齐。","流俗众，仁者希。","果仁者，人多畏。","言不讳，色不媚。"],pinyin:["tóng shì rén ， lèi bù qí 。","liú sú zhòng ， rén zhě xī 。","guǒ rén zhě ， rén duō wèi 。","yán bù huì ， sè bù mèi 。"],difficulty:2},
    {id:"dg018",title:"弟子规（余力学文·一）",content:["不力行，但学文。","长浮华，成何人。","但力行，不学文。","任己见，昧理真。"],pinyin:["bù lì xíng ， dàn xué wén 。","zhǎng fú huá ， chéng hé rén 。","dàn lì xíng ， bù xué wén 。","rèn jǐ jiàn ， mèi lǐ zhēn 。"],difficulty:2},
    {id:"dg019",title:"弟子规（余力学文·二）",content:["读书法，有三到。","心眼口，信皆要。","方读此，勿慕彼。","此未终，彼勿起。"],pinyin:["dú shū fǎ ， yǒu sān dào 。","xīn yǎn kǒu ， xìn jiē yào 。","fāng dú cǐ ， wù mù bǐ 。","cǐ wèi zhōng ， bǐ wù qǐ 。"],difficulty:2},

// =====================================================================
//  搜索功能
// =====================================================================
let searchKeyword = '';
let searchType = 'all'; // all, title, author, dynasty

function handleSearch(keyword) {
  searchKeyword = keyword.trim().toLowerCase();
  
  // 显示/隐藏清除按钮
  const clearBtn = document.getElementById('search-clear');
  if (clearBtn) {
    clearBtn.classList.toggle('show', searchKeyword.length > 0);
  }
  
  // 重新渲染列表
  renderList();
}

function setSearchType(type) {
  searchType = type;
  
  // 更新按钮状态
  document.querySelectorAll('.search-type-tab').forEach(btn => {
    btn.classList.remove('active');
  });
  event.target.classList.add('active');
  
  // 重新搜索
  handleSearch(document.getElementById('search-input').value);
}

function clearSearch() {
  const input = document.getElementById('search-input');
  if (input) {
    input.value = '';
    handleSearch('');
  }
}

function filterItemsByKeyword(items) {
  if (!searchKeyword) return items;
  
  return items.filter(item => {
    if (searchType === 'all') {
      const titleMatch = item.title && item.title.toLowerCase().includes(searchKeyword);
      const authorMatch = item.author && item.author.toLowerCase().includes(searchKeyword);
      const dynastyMatch = item.dynasty && item.dynasty.toLowerCase().includes(searchKeyword);
      return titleMatch || authorMatch || dynastyMatch;
    } else if (searchType === 'title') {
      return item.title && item.title.toLowerCase().includes(searchKeyword);
    } else if (searchType === 'author') {
      return item.author && item.author.toLowerCase().includes(searchKeyword);
    } else if (searchType === 'dynasty') {
      return item.dynasty && item.dynasty.toLowerCase().includes(searchKeyword);
    }
    return true;
  });
}

function updateStreak(){
  const today=new Date().toISOString().slice(0,10);
  const yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
  
  if(state.lastStudyDate===today){
    return;
  }
  
  if(state.lastStudyDate===yesterday){
    state.streakDays++;
  } else if(state.lastStudyDate!==today){
    state.streakDays=1;
  }
  
  state.lastStudyDate=today;
  saveState();
}

// 朗读诗词 - Web Speech API
let ttsSpeaking=false;
function speakPoem(){
  if(ttsSpeaking){
    window.speechSynthesis.cancel();
    ttsSpeaking=false;
    const btn=document.getElementById('tts-btn');
    if(btn){
      btn.textContent='🔊 朗读诗词';
      btn.classList.remove('speaking');
    }
    return;
  }
  
  const item=state.currentItem;
  if(!item){
    alert('未找到诗词内容');
    return;
  }
  
  if(!window.speechSynthesis){
    alert('您的浏览器不支持语音合成功能');
    return;
  }
  
  const text=item.content.join('。')+'。';
  const utter=new SpeechSynthesisUtterance(text);
  utter.lang='zh-CN';
  utter.rate=0.8;
  utter.pitch=1;
  utter.onend=function(){
    ttsSpeaking=false;
    var btn=document.getElementById('tts-btn');
    if(btn){
      btn.textContent='🔊 朗读诗词';
      btn.classList.remove('speaking');
    }
  };
  utter.onerror=function(){
    ttsSpeaking=false;
    var btn=document.getElementById('tts-btn');
    if(btn){
      btn.textContent='🔊 朗读诗词';
      btn.classList.remove('speaking');
    }
  };
  
  window.speechSynthesis.speak(utter);
  ttsSpeaking=true;
  var btn=document.getElementById('tts-btn');
  if(btn){
    btn.textContent='⏸ 停止朗读';
    btn.classList.add('speaking');
  }
}

function norm(s){return (s||'').replace(/[，。？！；：""''（）《》、\s\-.,!?;:'"()\[\]{}]/g,'')}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function pickRandom(arr,n){return shuffle(arr).slice(0,n)}
function getLevel(points){
  let l=LEVELS[0];for(const lv of LEVELS){if(points>=lv.need)l=lv}return l.name
}

function startChallenge(moduleType,itemId){
  state.currentModule=moduleType;
  state.currentItemId=itemId;
  state.questionIndex=0;
  state.answers=[];
  state.selectedValue=null;
  const item=ALL_DATA[moduleType]?ALL_DATA[moduleType].find(i=>i.id===itemId):null;
  if(!item && ALL_DATA[moduleType] && ALL_DATA[moduleType].length>0){
    item=ALL_DATA[moduleType][0];
  }
  if(!item)return;
  state.questions=generateQuestions(item,moduleType);
  showPage('challenge');
  renderQuestion();
}

function generateQuestions(item,moduleType){
  const questions=[];
  const content=item.content||[];
  const allItems=currentModuleData;

  // Q1: 选择题
  if(content.length>0){
    const targetIdx=Math.floor(Math.random()*content.length);
    const correct=content[targetIdx].replace(/[，。]/g,'');
    const otherItems=allItems.filter(i=>i.id!==item.id);
    const others=pickRandom(otherItems,3).map(i=>{
      const c=i.content[Math.floor(Math.random()*i.content.length)];
      return c.replace(/[，。]/g,'');
    }).filter(o=>o!==correct);
    while(others.length<3){
      others.push('未知诗句'+others.length);
    }
    const opts=[correct,...others];
    questions.push({type:'choice',question:`请选出《${item.title}》中的诗句：`,options:shuffle(opts),answer:correct,explanation:`「${content[targetIdx]}」出自《${item.title}》。`});
  }

  // Q2: 填空题
  if(content.length>=2){
    const blankIdx=Math.floor(Math.random()*(content.length-1))+1;
    const answer=content[blankIdx].replace(/[，。]/g,'');
    const hint=content[blankIdx-1];
    questions.push({type:'fill',question:`请补全诗句：<br><br><strong>${hint}</strong><br>＿＿＿`,answer:answer,explanation:`正确答案：「${content[blankIdx]}」`});
  }

  // Q3: 判断题
  {
    const isReal=Math.random()>0.5;
    const realIdx=Math.floor(Math.random()*content.length);
    const realContent=content[realIdx]||'';
    const otherItems=allItems.filter(i=>i.id!==item.id);
    const fakeItem=otherItems.length>0?otherItems[Math.floor(Math.random()*otherItems.length)]:null;
    const fakeContent=fakeItem?(fakeItem.content||[''])[0]||'':'未知诗句';
    const testContent=isReal?realContent:fakeContent;
    questions.push({type:'truefalse',question:`判断：「${testContent}」是《${item.title}》中的内容吗？`,answer:isReal?'true':'false',explanation:isReal?`「${realContent}」是《${item.title}》中的内容。`:`「${testContent}」不是《${item.title}》中的内容。`});
  }

  // Q4: 排序题
  if(content.length>=3){
    const shuffled=shuffle([...content]);
    const answerArr=content.map(c=>c.replace(/[，。]/g,''));
    questions.push({type:'order',question:`请将诗句按正确顺序排列：`,items:shuffled.map(c=>c.replace(/[，。]/g,'')),answer:answerArr.join('|'),explanation:`正确顺序：<br>${content.join('<br>')}`});
  }

  // Q5: 选择题2
  if(content.length>=2){
    const targetIdx2=Math.floor(Math.random()*(content.length-1))+1;
    const correct2=content[targetIdx2].replace(/[，。]/g,'');
    const hint2=content[targetIdx2-1];
    const otherItems=allItems.filter(i=>i.id!==item.id);
    const others2=pickRandom(otherItems,3).map(i=>{
      const c=i.content[Math.floor(Math.random()*i.content.length)];
      return c.replace(/[，。]/g,'');
    }).filter(o=>o!==correct2);
    while(others2.length<3){
      others2.push('未知诗句'+others2.length);
    }
    const opts2=[correct2,...others2];
    questions.push({type:'choice',question:`请选出下一句：<br><strong>${hint2}</strong><br>＿＿＿`,options:shuffle(opts2),answer:correct2,explanation:`完整诗句是「${content[targetIdx2]}」`});
  }

  // 确保5题
  while(questions.length<5){
    questions.push({type:'choice',question:`关于《${item.title}》，下列说法正确的是？`,options:['作者是'+item.author,'作者是杜甫','作者是李白','作者是白居易'],answer:'作者是'+item.author,explanation:`《${item.title}》的作者是${item.dynasty||''}的${item.author}。`});
  }
  return questions.slice(0,5);
}

// =====================================================================
//  渲染题目
// =====================================================================
function renderQuestion(){
  const q=state.questions[state.questionIndex];
  if(!q)return;
  const card=document.getElementById('question-card');
  const counter=document.getElementById('challenge-counter');
  const fill=document.getElementById('challenge-progress-fill');
  const btn=document.getElementById('submit-btn');

  if(counter)counter.textContent=`第 ${state.questionIndex+1} 题 / 共 ${state.questions.length} 题`;
  if(fill)fill.style.width=((state.questionIndex)/state.questions.length*100)+'%';
  if(btn){
    btn.disabled=true;
    btn.textContent='提交答案';
    btn.onclick=handleSubmit;
  }
  state.selectedValue=null;

  let html='';
  const tagClass=q.type==='choice'?'tag-choice':q.type==='fill'?'tag-fill':q.type==='truefalse'?'tag-tf':'tag-order';
  const tagText={choice:'选择题',fill:'填空题',truefalse:'判断题',order:'排序题'}[q.type];

  html+=`<div class="question-type-tag ${tagClass}">${tagText}</div>`;
  html+=`<div class="question-text">${q.question}</div>`;

  if(q.type==='choice'){
    html+='<div class="option-list">';
    q.options.forEach((opt,i)=>{
      html+=`<button class="option-btn" onclick="selectOption(this,${i})"><span class="option-letter">${String.fromCharCode(65+i)}</span><span>${opt}</span></button>`;
    });
    html+='</div>';
  }else if(q.type==='fill'){
    html+=`<input class="fill-input" id="fill-input" placeholder="请输入答案..." oninput="handleFillInput()">`;
    html+='<div class="question-hint">提示：不需要输入标点符号</div>';
  }else if(q.type==='truefalse'){
    html+='<div class="tf-btns">';
    html+=`<button class="tf-btn" id="tf-true" onclick="selectTF(true)">✔ 正确</button>`;
    html+=`<button class="tf-btn" id="tf-false" onclick="selectTF(false)">✘ 错误</button>`;
    html+='</div>';
  }else if(q.type==='order'){
    html+='<div class="order-area" id="order-area">';
    q.items.forEach((item,idx)=>{
      html+=`<div class="order-item" draggable="true" data-idx="${idx}" ondragstart="oDragStart(event,${idx})" ondragover="oDragOver(event)" ondrop="oDrop(event,${idx})"><span class="order-num">${idx+1}</span><span>${item}</span></div>`;
    });
    html+='</div>';
    html+='<div class="question-hint">拖拽诗句调整顺序，完成后点击"提交答案"</div>';
    if(btn)btn.disabled=false;
  }

  card.innerHTML=html;
  card.dataset.explanation=q.explanation||'';
  card.classList.remove('fade-in');
  void card.offsetWidth;
  card.classList.add('fade-in');

  if(q.type==='order'){
    const btn2=document.getElementById('submit-btn');
    if(btn2){
      btn2.disabled=false;
    }
  }
  
  setTimeout(()=>{
    const finalBtn=document.getElementById('submit-btn');
    if(finalBtn && q.type==='order'){
      finalBtn.disabled=false;
    }
  },0);
}

function selectOption(btn,idx){
  document.querySelectorAll('.option-btn').forEach(b=>b.classList.remove('selected','correct','wrong'));
  btn.classList.add('selected');
  state.selectedValue=idx;

function handleFillInput(){

  if(!input)return;
  const val=input.value.trim();

  if(submitBtn)submitBtn.disabled=val.length===0;
}

function selectTF(val){
  state.selectedValue=val;
  const tfTrue=document.getElementById('tf-true');
  const tfFalse=document.getElementById('tf-false');
  if(tfTrue){
    tfTrue.classList.remove('selected-correct','selected-wrong');
  }
  if(tfFalse){
    tfFalse.classList.remove('selected-correct','selected-wrong');
  }
  if(val===true){
    if(tfTrue)tfTrue.classList.add('selected-correct');
  } else {
    if(tfFalse)tfFalse.classList.add('selected-wrong');
  }
  const submitBtn=document.getElementById('submit-btn');
  if(submitBtn)submitBtn.disabled=false;
}

// 拖拽排序
let oDragIdx=-1;
function oDragStart(e,idx){
  oDragIdx=idx;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain','');
}
function oDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
}
function oDrop(e,targetIdx){
  e.preventDefault();
  if(oDragIdx===-1)return;
  
  const area=document.getElementById('order-area');
  if(!area)return;
  
  const children=Array.from(area.children);
  const items=children.map(el=>({
    text:el.querySelector('span:last-child').textContent,
    idx:parseInt(el.dataset.idx)
  }));
  
  const srcPos=items.findIndex(it=>it.idx===oDragIdx);
  if(srcPos===-1||srcPos===targetIdx)return;
  
  [items[srcPos],items[targetIdx]]=[items[targetIdx],items[srcPos]];
  
  area.innerHTML='';
  items.forEach((it,i)=>{
    const div=document.createElement('div');
    div.className='order-item';
    div.draggable=true;
    div.dataset.idx=it.idx;
    div.ondragstart=function(ev){oDragStart(ev,it.idx)};
    div.ondragover=oDragOver;
    div.ondrop=function(ev){oDrop(ev,i)};
    div.innerHTML=`<span class="order-num">${i+1}</span><span>${it.text}</span>`;
    area.appendChild(div);
  });
  oDragIdx=-1;
}

// =====================================================================
//  提交答案
// =====================================================================
function handleSubmit(){
  const q=state.questions[state.questionIndex];
  if(!q)return;
  const card=document.getElementById('question-card');
  let isCorrect=false;

  if(q.type==='choice'){
    if(state.selectedValue===null)return;
    isCorrect=(q.options[state.selectedValue]===q.answer);
    document.querySelectorAll('.option-btn').forEach((b,i)=>{
      if(i===state.selectedValue) b.classList.add(isCorrect?'correct':'wrong');
      if(i!==state.selectedValue&&q.options[i]===q.answer) b.classList.add('correct');
    });
  }else if(q.type==='fill'){
    const val=document.getElementById('fill-input').value.trim();
    isCorrect=(norm(val)===norm(q.answer));
    const input=document.getElementById('fill-input');
    if(input){
      input.style.borderColor=isCorrect?'#27ae60':'#e74c3c';
      input.style.background=isCorrect?'#e8f5e9':'#fde8e8';
      input.disabled=true;
    }
    if(!isCorrect){
      console.log('填空判错：输入='+norm(val)+' | 答案='+norm(q.answer));
    }
  }else if(q.type==='truefalse'){
    if(state.selectedValue===null)return;
    isCorrect=(state.selectedValue===true?'true':'false')===q.answer;
  }else if(q.type==='order'){
    const area=document.getElementById('order-area');
    if(!area){
      alert('提交失败：找不到排序区域，请刷新页面重试');
      return;
    }
    const userOrder=Array.from(area.children).map(el=>norm(el.querySelector('span:last-child').textContent));
    const correctOrder=q.answer.split('|').map(norm);
    isCorrect=userOrder.length===correctOrder.length && userOrder.every((val,idx)=>val===correctOrder[idx]);
  }

  state.answers.push({isCorrect});
  const submitBtn=document.getElementById('submit-btn');
  if(submitBtn){
    submitBtn.disabled=false;
    submitBtn.textContent=state.questionIndex<state.questions.length-1?'下一题 →':'查看结果';
    submitBtn.onclick=nextQuestion;
  }

  if(card){
    card.innerHTML+=`<div style="margin-top:16px;padding:12px;background:${isCorrect?'#e8f5e9':'#fde8e8'};border-radius:8px;font-size:14px">${isCorrect?'✅ 回答正确！':'❌ 回答错误。'}${card.dataset.explanation?'<br><br>📖 '+card.dataset.explanation:''}</div>`;
  }
}

function nextQuestion(){
  try{
    state.questionIndex++;
    if(state.questionIndex>=state.questions.length){
      showResultPage();
      return;
    }
    renderQuestion();
  }catch(e){
    alert('切换下一题时出错：'+e.message);
  }
}

// =====================================================================
//  结果页
// =====================================================================
function showResultPage(){
  const correct=state.answers.filter(a=>a.isCorrect).length;
  const total=state.answers.length;
  const accuracy=correct/total;
  const score=Math.round(accuracy*100);
  let stars=1;
  if(accuracy>=0.8)stars=3;else if(accuracy>=0.6)stars=2;

  // 积分
  const earned=10+(stars-1)*5;
  state.userPoints+=earned;
  state.userLevel=getLevel(state.userPoints);

  // 统计
  checkDate();
  updateStreak();
  state.stats.challenges++;
  state.stats.bestScore=Math.max(state.stats.bestScore,score);
  state.stats.totalStars+=stars;
  state.todayCount++;
  if(!state.learnedIds.includes(state.currentItemId)){
    state.learnedIds.push(state.currentItemId);
  }

  // 徽章
  let newBadge=null;
  if(state.stats.challenges===1&&!state.badges.includes('b001')){
    state.badges.push('b001');
    newBadge='b001';
  }
  if(state.learnedIds.length>=50&&!state.badges.includes('b002')){
    state.badges.push('b002');
    newBadge='b002';
  }
  if(stars===3&&!state.badges.includes('b003')){
    state.badges.push('b003');
    newBadge='b003';
  }
  if(state.streakDays>=7&&!state.badges.includes('b004')){
    state.badges.push('b004');
    newBadge='b004';
  }
  if(state.userLevel==='状元'&&!state.badges.includes('b005')){
    state.badges.push('b005');
    newBadge='b005';
  }

  saveState();

  // 渲染
  const resultEmoji=document.getElementById('result-emoji');
  if(resultEmoji)resultEmoji.textContent=accuracy>=0.6?'🎉':'💪';
  const resultTitle=document.getElementById('result-title');
  if(resultTitle)resultTitle.textContent=accuracy>=0.6?'闯关成功！':'继续加油！';
  const resultStars=document.getElementById('result-stars');
  if(resultStars)resultStars.textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  const resultScore=document.getElementById('result-score');
  if(resultScore)resultScore.textContent=`得分：${score} 分（正确 ${correct}/${total}）`;
  const resultPoints=document.getElementById('result-points');
  if(resultPoints)resultPoints.textContent=`获得 ${earned} 积分 · 当前 ${state.userPoints} 积分（${state.userLevel}）`;

  const badgeEl=document.getElementById('result-badge');
  if(newBadge&&badgeEl){
    const def=BADGE_DEFS.find(b=>b.id===newBadge);
    if(def){
      badgeEl.classList.remove('hidden');
      const badgeIcon=document.getElementById('badge-icon');
      if(badgeIcon)badgeIcon.textContent=def.icon;
      const badgeName=document.getElementById('badge-name');
      if(badgeName)badgeName.textContent='🏅 解锁徽章：'+def.name;
      const badgeDesc=document.getElementById('badge-desc');
      if(badgeDesc)badgeDesc.textContent=def.desc;
    }
  }else if(badgeEl){
    badgeEl.classList.add('hidden');
  }

  showPage('result');
}

function retryChallenge(){
  state.questionIndex=0;
  state.answers=[];
  state.selectedValue=null;
  const item=ALL_DATA[state.currentModule]?ALL_DATA[state.currentModule].find(i=>i.id===state.currentItemId):null;
  if(!item && ALL_DATA[state.currentModule] && ALL_DATA[state.currentModule].length>0){
    item=ALL_DATA[state.currentModule][0];
  }
  if(!item)return;
  state.questions=generateQuestions(item,state.currentModule);
  showPage('challenge');
  renderQuestion();
}

function startChallengeFromDetail(){
  if(state.currentItem){
    startChallenge(state.currentModule,state.currentItem.id);
  }
}

function confirmLeave(){
  try{
    if(confirm('确定要离开闯关吗？当前进度将不会保存。')){
      const mod=state.currentModule||'tangshi';
      if(typeof goList==='function'){
        goList(mod);
      }else{
        alert('系统错误：goList函数未定义');
      }
    }
  }catch(e){
    alert('离开闯关时出错：'+e.message);
  }
}

// =====================================================================
//  数据重置
// =====================================================================
function resetAllData(){
  if(!confirm('确定要重置所有学习数据吗？此操作不可撤销。'))return;
  
  const userId = getcurrentUserId();
  if (!userId) {
    alert('未找到当前用户！');
    return;
  }
  
  // 只重置当前用户的数据
  state.userPoints=0;
  state.userLevel='童生';
  state.badges=[];
  state.learnedIds=[];
  state.todayCount=0;
  state.todayDate='';
  state.lastStudyDate='';
  state.streakDays=0;
  state.stats={challenges:0,bestScore:0,totalStars:0};
  
  saveState();
  alert('数据已重置！');
  goHome();
}

// =====================================================================
//  启动
// =====================================================================
function initApp() {
  // 初始化用户系统
  initializeUsers();
  
  // 检查是否有当前用户
  const userId = getcurrentUserId();
  const usersData = loadUsers();
  
  if (userId && usersData.users[userId]) {
    // 已登录，加载用户数据
    loadUserState(userId);
    showPage('home');
    renderHome();
  } else {
    // 未登录，显示用户选择页
    renderUserSelectPage();
    showPage('user-select');
  }
}

// 启动应用
initApp();
</script>
